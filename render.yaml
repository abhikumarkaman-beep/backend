services:
  - type: web
    name: krishiconnect-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python setup_database.py
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEYS
        sync: false
      - key: TWILIO_ACCOUNTS
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: TEST_NUMBERS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: DEMO_RETAILER_NUMBER
        sync: false
      - key: PIPELINE_CACHE_HOURS
        value: "24"
